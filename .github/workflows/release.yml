name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build DMG
        run: npx electron-builder --mac --publish never
      - name: Upload Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: dist/*.dmg
          draft: true
