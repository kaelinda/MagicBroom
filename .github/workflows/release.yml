name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build DMG
        run: npx electron-builder --mac --publish never
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          draft: true
